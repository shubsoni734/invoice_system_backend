    schema: "internal/pkg/db/migrations"
    gen:
      go:
        package: "authdb"
        out: "internal/domain/superadmin/auth/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "inet"
